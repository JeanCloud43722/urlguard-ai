version: '3.8'

services:
  # Redis for caching and Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: urlguard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - urlguard-network

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: urlguard-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: urlguard
      MYSQL_USER: urlguard
      MYSQL_PASSWORD: urlguard_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - urlguard-network

  # URLGuard AI Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: urlguard-app
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://urlguard:urlguard_password@mysql:3306/urlguard
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      DEEPSEEK_API_URL: ${DEEPSEEK_API_URL}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key}
      VITE_APP_ID: ${VITE_APP_ID}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL}
    ports:
      - "3000:3000"
      - "9090:9090"  # Prometheus metrics
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: pnpm dev
    networks:
      - urlguard-network

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: urlguard-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - urlguard-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: urlguard-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - urlguard-network

volumes:
  redis_data:
  mysql_data:
  prometheus_data:
  grafana_data:

networks:
  urlguard-network:
    driver: bridge
