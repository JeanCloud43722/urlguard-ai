global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'urlguard-ai'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - 'alert_rules.yml'

scrape_configs:
  # URLGuard AI Application
  - job_name: 'urlguard-app'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:6379']
    metrics_path: '/metrics'

  # MySQL (via mysqld_exporter)
  - job_name: 'mysql'
    static_configs:
      - targets: ['localhost:9104']
    metrics_path: '/metrics'

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: '/metrics'
